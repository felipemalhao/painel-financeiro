<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Painel Financeiro — Botim / Filhote</title>
<style>
  :root{
    --bg:#0f1115; --surface:#171a21; --surface2:#1f232c; --line:#2a2f3a;
    --txt:#e8eaed; --muted:#9aa3b2; --accent:#3b82f6; --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
    --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:15px;line-height:1.5}
  a{color:var(--accent)}
  .hidden{display:none!important}
  header{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header h1{font-size:16px;font-weight:600;margin:0;flex:1;min-width:140px}
  header .who{font-size:12px;color:var(--muted)}
  select,input,button{font:inherit;color:var(--txt);background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:7px 10px}
  button{cursor:pointer}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  button.ghost{background:transparent}
  nav{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;border-bottom:1px solid var(--line);position:sticky;top:53px;background:var(--bg);z-index:19}
  nav button{white-space:nowrap;border-radius:999px;padding:6px 14px;font-size:14px}
  nav button.active{background:var(--accent);border-color:var(--accent);color:#fff}
  main{padding:16px;max-width:1100px;margin:0 auto}
  .grid{display:grid;gap:12px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .kpi .label{font-size:12px;color:var(--muted)}
  .kpi .value{font-size:23px;font-weight:700;margin-top:4px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:3px}
  .sec-title{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:24px 0 10px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:right;padding:8px 10px;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--muted);font-weight:500;font-size:12px}
  tr:last-child td{border-bottom:none}
  td input{width:90px;text-align:right;padding:5px 7px}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:600}
  .pill.good{background:rgba(34,197,94,.15);color:var(--good)}
  .pill.warn{background:rgba(245,158,11,.15);color:var(--warn)}
  .pill.bad{background:rgba(239,68,68,.15);color:var(--bad)}
  .verdict{padding:14px 16px;border-radius:var(--radius);margin:14px 0;font-size:15px}
  .verdict.good{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.4)}
  .verdict.warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.4)}
  .verdict.bad{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .muted{color:var(--muted)}
  .pos{color:var(--good)} .neg{color:var(--bad)}
  #login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50}
  #login .box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:28px;width:330px;max-width:90vw}
  #login h2{margin:0 0 4px;font-size:20px}
  #login p{margin:0 0 18px;color:var(--muted);font-size:13px}
  #login input{width:100%;margin-bottom:10px}
  #login button{width:100%}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--good);color:#04210f;padding:9px 16px;border-radius:999px;font-weight:600;font-size:13px;opacity:0;transition:opacity .2s;z-index:60}
  #toast.show{opacity:1}
  canvas{max-width:100%}
  .slider-wrap{display:flex;align-items:center;gap:12px;margin:10px 0}
  input[type=range]{flex:1;padding:0}
  .err{color:var(--bad);font-size:13px;min-height:18px}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <h2>Painel Financeiro</h2>
    <p>Botim · Brochevique · Filhote</p>
    <input id="email" type="email" value="felipemalhao@gmail.com" placeholder="email" />
    <input id="password" type="password" placeholder="senha" />
    <button class="primary" id="loginBtn">Entrar</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <h1>Painel Financeiro</h1>
    <div class="row">
      <label class="who">Cenário</label>
      <select id="scenario">
        <option value="min">Mínimo</option>
        <option value="med">Médio</option>
        <option value="max" selected>Máximo (eleição)</option>
      </select>
      <button class="ghost" id="exportBtn" title="Exportar Excel">Excel</button>
      <button class="ghost" id="logoutBtn">Sair</button>
    </div>
  </header>
  <nav id="tabs"></nav>
  <main id="view"></main>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SUPABASE_URL="https://eyfhdyairinbapjqolpn.supabase.co";
const SUPABASE_KEY="sb_publishable_T5KGf7wMcImPMjtYKOiFxA_3-RR-tSx";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const MONTHS=["2026-06-01","2026-07-01","2026-08-01","2026-09-01","2026-10-01","2026-11-01"];
const MLAB=["jun","jul","ago","set","out","nov"];
const FAMILIA=74000;
let db={}, scenario="max", chart=null, curTab="geral";

const brl=v=>(v<0?"-":"")+"R$ "+Math.abs(Math.round(v)).toLocaleString("pt-BR");
const brl2=v=>"R$ "+Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=v=>(Math.round(v*1000)/10).toLocaleString("pt-BR")+"%";
const P=k=>{const r=(db.parametros||[]).find(x=>x.chave===k);return r?(r.valor_num!=null?Number(r.valor_num):r.valor_txt):null;};
const nextM=m=>{const d=new Date(m);d.setMonth(d.getMonth()+1);return d.toISOString().slice(0,10);};
function toast(t){const e=document.getElementById("toast");e.textContent=t;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),1400);}

async function loadAll(){
  const tabs=["empresas","emprestimos","parcelamentos","parcelas","produtos","precos","custos_unitarios","estoque","custos_fixos","custos_variaveis","vendas_historicas","parametros","projecoes","ofertas"];
  const out={};
  for(const t of tabs){const{data,error}=await sb.from("fin_"+t).select("*");if(error)throw error;out[t]=data;}
  return out;
}
async function ensureParams(){
  const defs={cogs_reposicao_pct:0.15};
  for(const k in defs){if(!(db.parametros||[]).some(p=>p.chave===k)){await sb.from("fin_parametros").insert({chave:k,valor_num:defs[k],descricao:"Reposição de mercadoria (% do faturamento)"});}}
}
async function saveField(table,id,field,value){
  const patch={};patch[field]=value;
  const{error}=await sb.from("fin_"+table).update(patch).eq("id",id);
  if(error){alert("Erro ao salvar: "+error.message);return;}
  const row=(db[table]||[]).find(r=>r.id===id);if(row)row[field]=value;
  toast("salvo");recompute();
}
async function saveParam(chave,value){
  const{error}=await sb.from("fin_parametros").upsert({chave,valor_num:value},{onConflict:"chave"});
  if(error){alert(error.message);return;}
  let r=(db.parametros||[]).find(p=>p.chave===chave);if(r)r.valor_num=value;else db.parametros.push({chave,valor_num:value});
  toast("salvo");recompute();
}

function custoUnit(prodId){
  const c=(db.custos_unitarios||[]).find(x=>x.produto_id===prodId);
  if(!c)return 0;return Number(c.material)+Number(c.impressao)+Number(c.frete)+Number(c.mao_obra)+Number(c.outros);
}
function precoVarejo(prodId){
  const p=(db.precos||[]).find(x=>x.produto_id===prodId&&x.canal==="varejo");return p?Number(p.preco):0;
}
function precoAtacadoBaixo(prodId){
  const list=(db.precos||[]).filter(x=>x.produto_id===prodId&&x.canal==="atacado");
  if(!list.length)return 0;return Math.min(...list.map(x=>Number(x.preco)));
}
function precoMedio(pid){
  const offs=(db.ofertas||[]).filter(o=>o.produto_id===pid);
  if(!offs.length)return precoVarejo(pid);
  const sum=offs.reduce((a,o)=>a+Number(o.share_pct),0)||1;
  return offs.reduce((a,o)=>a+Number(o.preco_un)*(Number(o.share_pct)/sum),0);
}

function cashflow(scn){
  const fixos=(db.custos_fixos||[]).filter(c=>c.ativo).reduce((s,c)=>s+Number(c.valor_mensal),0);
  const gw=Number(P("taxa_gateway_efetiva")??0.012);
  const cogs=Number(P("cogs_reposicao_pct")??0.15);
  const teto=Number(P("teto_mei")??81000);
  const aliq=Number(P("aliquota_me_comercio")??0.04);
  const histAtual=(db.vendas_historicas||[]).filter(v=>v.mes>="2026-01-01"&&v.mes<"2026-06-01").reduce((s,v)=>s+Number(v.receita),0);
  const projAnual=(db.projecoes||[]).filter(p=>p.cenario===scn).reduce((s,p)=>s+Number(p.receita),0);
  const anual=histAtual+projAnual;
  const isME=anual>teto;
  let caixa=Number(P("saldo_caixa_inicial")??0);
  const rows=MONTHS.map(m=>{
    const receita=(db.projecoes||[]).filter(p=>p.cenario===scn&&String(p.mes).slice(0,10)===m).reduce((s,p)=>s+(p.produto_id?Number(p.quantidade)*precoMedio(p.produto_id):Number(p.receita||0)),0);
    const parcela=(db.parcelas||[]).filter(p=>p.quem_paga==="Felipe"&&String(p.vencimento)>=m&&String(p.vencimento)<nextM(m)).reduce((s,p)=>s+Number(p.valor),0);
    const imposto=isME?receita*aliq:Number(P("imposto_mei_mensal")??80);
    const gateway=receita*gw;
    const reposicao=receita*cogs;
    const saidas=fixos+parcela+imposto+gateway+reposicao;
    const saldo=receita-saidas;caixa+=saldo;
    return{m,receita,fixos,parcela,imposto,gateway,reposicao,saidas,saldo,caixa};
  });
  const caixaFinal=rows[rows.length-1].caixa;
  const payoff=Math.max(0,Math.min(FAMILIA,caixaFinal));
  return{rows,isME,anual,caixaFinal,payoff,sobra:caixaFinal-payoff};
}

function potencialEstoque(fracVarejo){
  const items=[];let teto=0,piso=0,real=0;
  const sell=(db.estoque||[]).filter(e=>["lacrado","montado","revenda","a_chegar"].includes(e.status)&&e.produto_id);
  const byProd={};
  sell.forEach(e=>{byProd[e.produto_id]=(byProd[e.produto_id]||0)+Number(e.quantidade);});
  for(const pid in byProd){
    const prod=(db.produtos||[]).find(p=>p.id==pid);if(!prod)continue;
    const q=byProd[pid];const pv=precoVarejo(prod.id);const pa=precoAtacadoBaixo(prod.id)||pv;
    const vTeto=q*pv,vPiso=q*pa,vReal=q*(pv*fracVarejo+pa*(1-fracVarejo));
    teto+=vTeto;piso+=vPiso;real+=vReal;
    items.push({nome:prod.nome,q,pv,pa,vTeto,vPiso,vReal});
  }
  items.sort((a,b)=>b.vReal-a.vReal);
  return{items,teto,piso,real};
}

function dividaTotal(){
  const fam=(db.emprestimos||[]).reduce((s,e)=>s+Number(e.valor),0);
  const broches=(db.parcelas||[]).filter(p=>p.quem_paga==="Felipe"&&(db.parcelamentos||[]).some(pp=>pp.id===p.parcelamento_id&&/Broches/i.test(pp.descricao))).reduce((s,p)=>s+Number(p.valor),0);
  return{fam,broches,total:fam+broches};
}

/* ---------- RENDER ---------- */
const TABS=[["geral","Visão geral"],["divida","Dívida"],["projecao","Projeção"],["ofertas","Ofertas & preço"],["produtos","Produtos & margem"],["estoque","Estoque"],["custos","Custos"]];
function renderTabs(){
  document.getElementById("tabs").innerHTML=TABS.map(([k,l])=>`<button data-tab="${k}" class="${k===curTab?"active":""}">${l}</button>`).join("");
  document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{curTab=b.dataset.tab;renderTabs();renderView();});
}
function recompute(){renderView();}
function renderView(){
  const v=document.getElementById("view");
  if(curTab==="geral")v.innerHTML=viewGeral();
  else if(curTab==="divida")v.innerHTML=viewDivida();
  else if(curTab==="projecao")v.innerHTML=viewProjecao();
  else if(curTab==="ofertas")v.innerHTML=viewOfertas();
  else if(curTab==="produtos")v.innerHTML=viewProdutos();
  else if(curTab==="estoque")v.innerHTML=viewEstoque();
  else if(curTab==="custos")v.innerHTML=viewCustos();
  bindInputs();
  if(curTab==="geral")drawChart();
  if(curTab==="estoque")bindSlider();
}

function viewGeral(){
  const cf=cashflow(scenario);const d=dividaTotal();const pot=potencialEstoque(0.5);
  let verdict,vclass;
  if(cf.payoff>=FAMILIA){verdict=`<b>Quita os R$ 74k da família em 1º/nov</b> e ainda sobra ${brl(cf.sobra)} em caixa.`;vclass="good";}
  else if(cf.payoff>=FAMILIA*0.5){verdict=`Paga ${brl(cf.payoff)} dos R$ 74k (${pct(cf.payoff/FAMILIA)}). Faltam ${brl(FAMILIA-cf.payoff)} — rolam pra depois (sem juros, é família).`;vclass="warn";}
  else{verdict=`Caixa insuficiente: paga só ${brl(cf.payoff)} dos R$ 74k. Neste cenário a quitação de novembro não fecha.`;vclass="bad";}
  const kpis=[
    ["Dívida total",brl(d.total),`família ${brl(d.fam)} + broches ${brl(d.broches)}`],
    ["Estoque (custo)",brl((db.estoque||[]).reduce((s,e)=>s+Number(e.valor_total||0),0)),"insumo + revenda + a chegar"],
    ["Potencial venda",brl(pot.real),`teto ${brl(pot.teto)} · piso ${brl(pot.piso)}`],
    ["Caixa proj. (nov, antes payoff)",brl(cf.caixaFinal),"cenário "+scenario],
    ["Regime tributário",cf.isME?"ME (Simples)":"MEI",cf.isME?`fat. anual ~${brl(cf.anual)} > teto`:`fat. anual ~${brl(cf.anual)}`],
    ["Custo fixo/mês",brl((db.custos_fixos||[]).filter(c=>c.ativo).reduce((s,c)=>s+Number(c.valor_mensal),0)),"ativos"]
  ];
  return `
  <div class="verdict ${vclass}">${verdict}</div>
  <div class="grid kpis">${kpis.map(k=>`<div class="card kpi"><div class="label">${k[0]}</div><div class="value">${k[1]}</div><div class="sub">${k[2]}</div></div>`).join("")}</div>
  <div class="sec-title">Fluxo de caixa jun–nov (cenário ${scenario})</div>
  <div class="card"><div style="position:relative;height:300px"><canvas id="cf" role="img" aria-label="Fluxo de caixa projetado"></canvas></div></div>
  <div class="sec-title">Detalhe mensal</div>
  <div class="card" style="overflow-x:auto"><table>
    <tr><th>Mês</th><th>Receita</th><th>Fixos</th><th>Parcela</th><th>Imposto</th><th>Taxa+repos.</th><th>Saldo</th><th>Caixa acum.</th></tr>
    ${cf.rows.map((r,i)=>`<tr><td>${MLAB[i]}</td><td>${brl(r.receita)}</td><td class="muted">${brl(-r.fixos)}</td><td class="muted">${brl(-r.parcela)}</td><td class="muted">${brl(-r.imposto)}</td><td class="muted">${brl(-(r.gateway+r.reposicao))}</td><td class="${r.saldo<0?"neg":"pos"}">${brl(r.saldo)}</td><td>${brl(r.caixa)}</td></tr>`).join("")}
  </table></div>`;
}

function viewDivida(){
  const emp=(db.emprestimos||[]).slice().sort((a,b)=>b.valor-a.valor);
  const parc=(db.parcelas||[]).slice().sort((a,b)=>String(a.vencimento).localeCompare(String(b.vencimento)));
  return `
  <div class="sec-title">Empréstimos de família (sem juros · quitar 1º/nov)</div>
  <div class="card" style="overflow-x:auto"><table>
    <tr><th>Credor</th><th>Valor</th><th>Finalidade</th></tr>
    ${emp.map(e=>`<tr><td>${e.credor}</td><td>${brl(e.valor)}</td><td class="muted" style="text-align:left;max-width:340px">${e.finalidade||""}</td></tr>`).join("")}
    <tr><td><b>Total</b></td><td><b>${brl(emp.reduce((s,e)=>s+Number(e.valor),0))}</b></td><td></td></tr>
  </table></div>
  <div class="sec-title">Parcelas no cartão (broches 6× + celular 18×)</div>
  <div class="card" style="overflow-x:auto"><table>
    <tr><th>Vencimento</th><th>Origem</th><th>Valor</th><th>Quem paga</th><th>Pago</th></tr>
    ${parc.map(p=>{const pp=(db.parcelamentos||[]).find(x=>x.id===p.parcelamento_id);return `<tr><td>${String(p.vencimento)}</td><td style="text-align:left">${pp?pp.descricao:""}</td><td>${brl(p.valor)}</td><td>${p.quem_paga}</td><td>${p.pago?'<span class="pill good">sim</span>':'<span class="pill warn">não</span>'}</td></tr>`;}).join("")}
  </table></div>`;
}

function viewProjecao(){
  const prods=[...new Set((db.projecoes||[]).filter(p=>p.produto_id).map(p=>p.produto_id))];
  const tot=MONTHS.map(()=>0);
  const body=prods.map(pid=>{
    const nome=((db.produtos||[]).find(p=>p.id===pid)||{}).nome||("#"+pid);
    const pm=precoMedio(pid);let rev=0;
    const cells=MONTHS.map((m,i)=>{
      const r=(db.projecoes||[]).find(p=>p.produto_id===pid&&p.cenario===scenario&&String(p.mes).slice(0,10)===m);
      const q=r?Number(r.quantidade):0;rev+=q*pm;tot[i]+=q*pm;
      return `<td><input type="number" data-table="projecoes" data-id="${r?r.id:''}" data-field="quantidade" value="${q}"></td>`;
    }).join('');
    return `<tr><td>${nome}</td><td class="muted">${brl2(pm)}</td>${cells}<td>${brl(rev)}</td></tr>`;
  }).join('');
  return `<div class="muted" style="margin-bottom:10px">Cenário <b>${scenario}</b> (troque no topo). Edite o <b>volume</b> (unidades) por produto/mês — a receita usa o preço médio das ofertas.</div>
  <div class="card" style="overflow-x:auto"><table>
  <tr><th>Produto</th><th>Preço méd.</th>${MLAB.map(l=>`<th>${l}</th>`).join('')}<th>Receita</th></tr>
  ${body}
  <tr><td colspan="2"><b>Receita/mês</b></td>${tot.map(v=>`<td><b>${brl(v)}</b></td>`).join('')}<td><b>${brl(tot.reduce((a,b)=>a+b,0))}</b></td></tr>
  </table></div>`;
}
function viewOfertas(){
  const prods=[...new Set((db.ofertas||[]).map(o=>o.produto_id))];
  let html=`<div class="muted" style="margin-bottom:10px">O preço médio de cada produto sai do mix de ofertas. Ajuste os % (não precisa somar 100 — normaliza sozinho) e os preços; isso alimenta a projeção.</div>`;
  prods.forEach(pid=>{
    const nome=((db.produtos||[]).find(p=>p.id===pid)||{}).nome||("#"+pid);
    const offs=(db.ofertas||[]).filter(o=>o.produto_id===pid).sort((a,b)=>(a.ordem||0)-(b.ordem||0));
    const sum=offs.reduce((a,o)=>a+Number(o.share_pct),0)||1;
    html+=`<div class="sec-title">${nome} — preço médio ${brl2(precoMedio(pid))}</div><div class="card" style="overflow-x:auto"><table>
    <tr><th>Oferta</th><th>Preço/un</th><th>% vendas</th><th>peso</th></tr>
    ${offs.map(o=>`<tr><td>${o.rotulo}</td><td><input type="number" step="0.01" data-table="ofertas" data-id="${o.id}" data-field="preco_un" value="${Number(o.preco_un)}"></td><td><input type="number" step="1" data-table="ofertas" data-id="${o.id}" data-field="share_pct" value="${Math.round(Number(o.share_pct))}"></td><td class="muted">${Math.round(Number(o.share_pct)/sum*100)}%</td></tr>`).join('')}
    </table></div>`;
  });
  return html;
}

function viewProdutos(){
  const prods=(db.produtos||[]).filter(p=>(db.custos_unitarios||[]).some(c=>c.produto_id===p.id)||precoVarejo(p.id));
  return `<div class="muted" style="margin-bottom:10px">Margem de contribuição no varejo (preço − custo unitário com mão de obra). Edite preço e custos.</div>
  <div class="card" style="overflow-x:auto"><table>
  <tr><th>Produto</th><th>Material</th><th>Impr.</th><th>Frete</th><th>Mão obra</th><th>Custo</th><th>Varejo</th><th>Margem</th></tr>
  ${prods.map(p=>{const c=(db.custos_unitarios||[]).find(x=>x.produto_id===p.id)||{};const cu=custoUnit(p.id);const pv=precoVarejo(p.id);const pr=(db.precos||[]).find(x=>x.produto_id===p.id&&x.canal==="varejo");const mg=pv>0?(pv-cu)/pv:0;
    return `<tr><td>${p.nome}</td>
    <td><input type="number" step="0.0001" data-table="custos_unitarios" data-id="${c.id||""}" data-field="material" value="${c.material??0}"></td>
    <td><input type="number" step="0.0001" data-table="custos_unitarios" data-id="${c.id||""}" data-field="impressao" value="${c.impressao??0}"></td>
    <td><input type="number" step="0.0001" data-table="custos_unitarios" data-id="${c.id||""}" data-field="frete" value="${c.frete??0}"></td>
    <td><input type="number" step="0.0001" data-table="custos_unitarios" data-id="${c.id||""}" data-field="mao_obra" value="${c.mao_obra??0}"></td>
    <td>${brl(cu)}</td>
    <td><input type="number" step="0.01" data-table="precos" data-id="${pr?pr.id:""}" data-field="preco" value="${pv}"></td>
    <td><span class="pill ${mg>0.5?"good":mg>0.3?"warn":"bad"}">${pct(mg)}</span></td></tr>`;}).join("")}
  </table></div>`;
}

function viewEstoque(){
  const pot=potencialEstoque(0.5);
  return `<div class="sec-title">Potencial de venda do estoque</div>
  <div class="muted">Arraste o mix: quanto do estoque você escoa no varejo vs atacado.</div>
  <div class="slider-wrap"><span class="muted">atacado</span><input type="range" id="mix" min="0" max="100" value="50" step="5"><span class="muted">varejo</span><b id="mixv" style="min-width:120px;text-align:right"></b></div>
  <div class="grid kpis">
    <div class="card kpi"><div class="label">Realizável (mix atual)</div><div class="value" id="potReal">${brl(pot.real)}</div></div>
    <div class="card kpi"><div class="label">Teto (tudo varejo)</div><div class="value">${brl(pot.teto)}</div></div>
    <div class="card kpi"><div class="label">Piso (tudo atacado)</div><div class="value">${brl(pot.piso)}</div></div>
  </div>
  <div class="sec-title">Por produto</div>
  <div class="card" style="overflow-x:auto"><table id="potTable">
  <tr><th>Produto</th><th>Qtde</th><th>Varejo</th><th>Atacado</th><th>Realizável</th></tr>
  ${pot.items.map(it=>`<tr><td>${it.nome}</td><td>${it.q.toLocaleString("pt-BR")}</td><td>${brl(it.vTeto)}</td><td>${brl(it.vPiso)}</td><td>${brl(it.vReal)}</td></tr>`).join("")}
  </table></div>`;
}

function viewCustos(){
  const cf=(db.custos_fixos||[]).slice().sort((a,b)=>b.valor_mensal-a.valor_mensal);
  const cv=(db.custos_variaveis||[]);
  return `<div class="sec-title">Custos fixos mensais</div>
  <div class="card" style="overflow-x:auto"><table>
  <tr><th>Item</th><th>R$/mês</th><th>Ativo</th></tr>
  ${cf.map(c=>`<tr><td>${c.item}</td><td><input type="number" step="1" data-table="custos_fixos" data-id="${c.id}" data-field="valor_mensal" value="${Math.round(c.valor_mensal)}"></td><td><input type="checkbox" data-table="custos_fixos" data-id="${c.id}" data-field="ativo" ${c.ativo?"checked":""}></td></tr>`).join("")}
  <tr><td><b>Total ativos</b></td><td><b>${brl(cf.filter(c=>c.ativo).reduce((s,c)=>s+Number(c.valor_mensal),0))}</b></td><td></td></tr>
  </table></div>
  <div class="sec-title">Custos variáveis (% do faturamento)</div>
  <div class="card" style="overflow-x:auto"><table>
  <tr><th>Item</th><th>%</th><th>Obs</th></tr>
  ${cv.map(c=>`<tr><td>${c.item}</td><td>${Number(c.percentual)}%</td><td class="muted" style="text-align:left">${c.observacao||""}</td></tr>`).join("")}
  <tr><td>Reposição de mercadoria</td><td><input type="number" step="1" id="cogsInput" value="${Math.round(Number(P("cogs_reposicao_pct")??0.15)*100)}">%</td><td class="muted" style="text-align:left">editável — entra no fluxo de caixa</td></tr>
  </table></div>`;
}

function bindInputs(){
  document.querySelectorAll("[data-table]").forEach(el=>{
    el.onchange=()=>{
      const t=el.dataset.table,id=Number(el.dataset.id),f=el.dataset.field;
      if(!id)return;
      let val=el.type==="checkbox"?el.checked:(el.type==="number"?Number(el.value):el.value);
      saveField(t,id,f,val);
    };
  });
  const cogs=document.getElementById("cogsInput");
  if(cogs)cogs.onchange=()=>saveParam("cogs_reposicao_pct",Number(cogs.value)/100);
}
function bindSlider(){
  const s=document.getElementById("mix");if(!s)return;
  const upd=()=>{const f=Number(s.value)/100;const pot=potencialEstoque(f);
    document.getElementById("mixv").textContent=Math.round(f*100)+"% varejo";
    document.getElementById("potReal").textContent=brl(pot.real);
    document.querySelector("#potTable").innerHTML=`<tr><th>Produto</th><th>Qtde</th><th>Varejo</th><th>Atacado</th><th>Realizável</th></tr>`+pot.items.map(it=>`<tr><td>${it.nome}</td><td>${it.q.toLocaleString("pt-BR")}</td><td>${brl(it.vTeto)}</td><td>${brl(it.vPiso)}</td><td>${brl(it.vReal)}</td></tr>`).join("");
  };
  s.oninput=upd;upd();
}
function drawChart(){
  const cf=cashflow(scenario);const ctx=document.getElementById("cf");if(!ctx)return;
  if(chart)chart.destroy();
  chart=new Chart(ctx,{type:"bar",
    data:{labels:MLAB,datasets:[
      {type:"bar",label:"Receita",data:cf.rows.map(r=>Math.round(r.receita)),backgroundColor:"#3b82f6",borderRadius:4},
      {type:"line",label:"Caixa acumulado",data:cf.rows.map(r=>Math.round(r.caixa)),borderColor:"#22c55e",backgroundColor:"#22c55e",tension:.3,fill:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:"#9aa3b2"}},tooltip:{callbacks:{label:c=>c.dataset.label+": "+brl(c.parsed.y)}}},
      scales:{x:{ticks:{color:"#9aa3b2"},grid:{display:false}},y:{ticks:{color:"#9aa3b2",callback:v=>"R$ "+(v/1000)+"k"},grid:{color:"rgba(255,255,255,.06)"}}}}
  });
}

function exportExcel(){
  const wb=XLSX.utils.book_new();
  const cf=cashflow(scenario);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cf.rows.map((r,i)=>({Mês:MLAB[i],Receita:Math.round(r.receita),Fixos:Math.round(r.fixos),Parcela:Math.round(r.parcela),Imposto:Math.round(r.imposto),TaxaRepos:Math.round(r.gateway+r.reposicao),Saldo:Math.round(r.saldo),CaixaAcum:Math.round(r.caixa)}))),"Fluxo "+scenario);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet((db.emprestimos||[]).map(e=>({Credor:e.credor,Valor:Number(e.valor),Finalidade:e.finalidade}))),"Empréstimos");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet((db.parcelas||[]).map(p=>({Venc:String(p.vencimento),Valor:Number(p.valor),QuemPaga:p.quem_paga,Pago:p.pago}))),"Parcelas");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet((db.estoque||[]).map(e=>({Item:e.descricao,Qtde:Number(e.quantidade),CustoUnit:Number(e.custo_unitario),Total:Number(e.valor_total),Status:e.status}))),"Estoque");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet((db.projecoes||[]).map(p=>({Mês:String(p.mes).slice(0,7),Cenário:p.cenario,Produto:((db.produtos||[]).find(x=>x.id===p.produto_id)||{}).nome,Volume:Number(p.quantidade),PrecoMedio:p.produto_id?Math.round(precoMedio(p.produto_id)*100)/100:0,Receita:p.produto_id?Math.round(Number(p.quantidade)*precoMedio(p.produto_id)):Number(p.receita||0)}))),"Projeção");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet((db.ofertas||[]).map(o=>({Produto:((db.produtos||[]).find(x=>x.id===o.produto_id)||{}).nome,Oferta:o.rotulo,Preco:Number(o.preco_un),SharePct:Number(o.share_pct)}))),"Ofertas");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet((db.custos_fixos||[]).map(c=>({Item:c.item,Mensal:Number(c.valor_mensal),Ativo:c.ativo}))),"Custos fixos");
  XLSX.writeFile(wb,"painel_financeiro.xlsx");
}

/* ---------- BOOT ---------- */
async function boot(){
  db=await loadAll();await ensureParams();
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  renderTabs();renderView();
}
document.getElementById("loginBtn").onclick=async()=>{
  const err=document.getElementById("loginErr");err.textContent="";
  const{error}=await sb.auth.signInWithPassword({email:document.getElementById("email").value,password:document.getElementById("password").value});
  if(error){err.textContent=error.message;return;}
  boot();
};
document.getElementById("password").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("loginBtn").click();});
document.getElementById("logoutBtn").onclick=async()=>{await sb.auth.signOut();location.reload();};
document.getElementById("scenario").onchange=e=>{scenario=e.target.value;renderView();};
document.getElementById("exportBtn").onclick=exportExcel;
sb.auth.getSession().then(({data})=>{if(data.session)boot();});
</script>
</body>
</html>
